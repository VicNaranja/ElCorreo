<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Correo — Portada</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- CABECERA -->
  <header id="top">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-ec">El Correo</span>
        <span class="logo-sub">Digest diario</span>
      </div>
      <div class="header-actions">
        <input type="text" id="busqueda" placeholder="🔍 Buscar noticia…" oninput="filtrar(this.value)">
        <button id="btn-actualizar" onclick="cargarNoticias()" title="Actualizar noticias">
          ↻ Actualizar
        </button>
      </div>
    </div>
    <!-- Barra de salto de sección (se rellena dinámicamente) -->
    <nav id="jump-nav"></nav>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main id="main">
    <div id="estado" class="estado-carga">
      <div class="spinner"></div>
      <p>Cargando noticias de El Correo…</p>
    </div>
    <div id="secciones"></div>
  </main>

  <!-- PIE -->
  <footer>
    <span id="pie-fecha"></span>
    &nbsp;·&nbsp;
    <a href="https://www.elcorreo.com" target="_blank" rel="noopener">elcorreo.com</a>
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
